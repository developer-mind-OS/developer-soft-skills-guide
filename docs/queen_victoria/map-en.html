    <style>

            --bg-color: #0d0e12;
            --card-bg: #14161e;

            content: '';

        }

        }
        .card-title {

        /* Modal */
        .modal {

        }

            position: relative;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            animation: modalScale 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalScale {
            from { transform: scale(0.9) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
        .close-btn {
            position: absolute;

<body>

<header>
    <h1>《维多利亚女王传》权力制衡与代理人治理 OS 知识图谱</h1>
    <p class="subtitle">通过 COO 行政中台、首相赛马、孀居悲情防御和地缘婚姻冷启动，透视大英帝国的系统级权力控制机制</p>
</header>

<div class="search-container">
    <input type="text" id="searchInput" class="search-input" placeholder="输入关键词搜索卡片（如：中台、赛马、孀居）..." oninput="filterCards()">
</div>

<div class="controls">
    <button class="btn active" onclick="filterModule('all', this)">全部</button>
    <button class="btn" onclick="filterModule('M1', this)" style="border-left-color: var(--theme-slate)">COO中台与内廷整置</button>
    <button class="btn" onclick="filterModule('M2', this)" style="border-left-color: var(--theme-green)">内阁赛马与官僚平衡</button>
    <button class="btn" onclick="filterModule('M3', this)" style="border-left-color: var(--theme-red)">孀居隐退与悲情防御</button>
    <button class="btn" onclick="filterModule('M4', this)" style="border-left-color: var(--theme-grey)">冷启动与地缘婚姻网</button>
</div>

<div class="grid" id="cardsGrid"></div>

<!-- Modal Container -->
<div class="modal" id="cardModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="hideModal()">&times;</span>
        <div id="modalId" class="modal-id"></div>
        <div id="modalTitle" class="modal-title"></div>
        <div id="modalBody" class="modal-body"></div>
    </div>
</div>

<script>
    const cards = [{"id": "EP1", "module": "M1", "moduleName": "COO Platform & Palace Restructuring", "color": "#4E6E8F", "title": "Agent Isolation & Platform Routing Rule", "body": "<li><strong>Definition</strong>: The owner (major shareholder) should not directly intervene in mundane daily operations, but must establish a strong administrative center and use professional routing to isolate external noise and prevent systemic burnouts at the decision-making level.</li><li><strong>Mechanism</strong>: Set up a professional COO operational system as the sole upstream/downstream \"information hub.\" It filters low-frequency noise and operational friction, presenting only professionally summarized, key decisions requiring sign-off.</li><li><strong>History</strong>: Albert the Prince Consort, acting as the royal COO, tidied up the palace's multi-stakeholder buck-passing. All cabinet documents were first reviewed, summarized, and sorted by the Prince, leaving the Queen to hear summaries and sign off.</li>"}, {"id": "EP2", "module": "M2", "moduleName": "Cabinet Balancing & Bureaucratic Equilibrium", "color": "#5D8061", "title": "Dynamic Racing & Balance Rule", "body": "<li><strong>Definition</strong>: To prevent a single agent (CEO/professional manager) from monopolizing information and holding the company hostage due to absolute power, parallel opposition forces must be utilized to maintain multi-line checks.</li><li><strong>Mechanism</strong>: Set up two or more competing lines within the same business ecosystem to activate efficiency through open competition. Use opposition audit and multi-line reporting to break agents' \"mutual good news protection.\"</li><li><strong>History</strong>: The Queen played political PMs against each other (Melbourne, Palmerston, Peel, Disraeli), using the opposition party to perform political snipes, ensuring the Crown could not be sidelined by any single strongman.</li>"}, {"id": "EP3", "module": "M3", "moduleName": "Widowed Rule & Brand Value Marketing", "color": "#A76565", "title": "Soft Power Moral Premium Rule", "body": "<li><strong>Definition</strong>: When the organization's hard power (market dividends, financial advantage, physical sovereignty) is at a low point, the survival of the organization depends on value output and an undisputed brand moral consensus.</li><li><strong>Mechanism</strong>: Retreat to the psychological line of defense, converting hard confrontation into soft defense. Establish an un-stealable moat through transparent storytelling, lifestyle publicization, and values declarations.</li><li><strong>History</strong>: In her later years, when the Crown lost substantial intervention rights in legislation, the Queen retreated to Balmoral. By publishing bestsellers like *Leaves from the Journal of Our Life in the Highlands* showing simple family values, she successfully resonated with the public.</li>"}, {"id": "EP4", "module": "M4", "moduleName": "Cold Start & Geopolitical Marriage Network", "color": "#7A7A7A", "title": "Milestone-based Cold Start Rule", "body": "<li><strong>Definition</strong>: In core assets facing absolute stagnation or succession crises, milestone-based clawback and escrow mechanisms must be established through parallel multi-node resources to secure the system's survival.</li><li><strong>Mechanism</strong>: Abandon centralized betting. Set up multiple external alliance lines at nodes where single-point failures might occur, hedging risk via probability and milestone clawbacks.</li><li><strong>History</strong>: The Duke of Kent took a milestone bet, renting a carriage to rush back to the UK so Victoria would be born on British soil to secure succession rights, successfully cold-starting the royal lineage system.</li>"}];
    let activeModule = 'all';
    let searchQuery = '';

    function renderCards() {
        const grid = document.getElementById('cardsGrid');
        grid.innerHTML = '';
        
        const filtered = cards.filter(card => {
            const matchesModule = activeModule === 'all' || card.module === activeModule;
            const matchesSearch = card.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                  card.body.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                  card.id.toLowerCase().includes(searchQuery.toLowerCase());
            return matchesModule && matchesSearch;
        });

        filtered.forEach(card => {
            const div = document.createElement('div');
            div.className = 'card';
            div.style.setProperty('--card-color', card.color);
            div.onclick = () => showModal(card);
            
            // extract preview text
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = card.body;
            const previewText = tempDiv.innerText || tempDiv.textContent || '';

            div.innerHTML = `
                <div class="card-header">
                    <span class="card-id" style="color: ${card.color}">${card.id}</span>
                    <span class="card-module">${card.moduleName}</span>
                </div>
                <div class="card-title">${card.title}</div>
                <div class="card-preview">${previewText}</div>
            `;
            grid.appendChild(div);
        });
    }

    function filterModule(mod, btn) {
        document.querySelectorAll('.controls .btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeModule = mod;
        renderCards();
    }

    function filterCards() {
        searchQuery = document.getElementById('searchInput').value;
        renderCards();
    }

    function showModal(card) {
        const modal = document.getElementById('cardModal');
        const mId = document.getElementById('modalId');
        const mTitle = document.getElementById('modalTitle');
        const mBody = document.getElementById('modalBody');
        
        mId.innerText = card.id;
        mId.style.color = card.color;
        mTitle.innerText = card.title;
        mTitle.style.borderLeftColor = card.color;
        mBody.innerHTML = card.body;
        
        modal.style.setProperty('--modal-accent', card.color);
        modal.classList.add('active');
    }

    function hideModal() {
        document.getElementById('cardModal').classList.remove('active');
    }

    function closeModal(e) {
        hideModal();
    }

    // Initial render
    renderCards();
</script>

</body>
