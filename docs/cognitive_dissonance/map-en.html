<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognitive Dissonance & Consistency OS Knowledge Map | Developer Mind OS developer-mind-OS</title>
    <meta name="description" content="Cognitive Dissonance Knowledge Map of conflict-monitoring and action-alignment OS, covering Action-Based Model, Self-Affirmation, New Look Liability, and Choice Justification.">
    <meta name="keywords" content="Cognitive Dissonance, Mental Burnout, Self-Affirmation, Forced Compliance, Choice Justification, Knowledge Map, Corporate Isomorphism">
    <meta name="author" content="Antigravity">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TechArticle",
      "headline": "Cognitive Dissonance & Consistency OS Knowledge Map",
      "description": "Based on Cognitive Dissonance theory, providing corporate-isomorphic models for action alignment, self-affirmation ego cushioning, risk insulation shields, and choice audit.",
      "inLanguage": "en",
      "author": {
        "@type": "Organization",
        "name": "Antigravity Team"
      }
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0d11;
            --card-bg: #141720;
            --text-color: #e2e8f0;
            --accent-color: #3182CE;
            --border-color: #222636;
            --theme-slate: #4E6E8F;
            --theme-blue: #3182CE;
            --theme-teal: #319795;
            --theme-orange: #DD6B20;
            --theme-grey: #7A7A7A;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            padding: 3rem 2rem;
            line-height: 1.6;
        }
        header {
            text-align: center;
            margin-bottom: 3rem;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #93c5fd, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 2rem;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.25s ease;
        }
        .btn:hover, .btn.active {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
            transform: translateY(-2px);
        }
        .search-container {
            max-width: 500px;
            margin: 0 auto 3rem auto;
        }
        .search-input {
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.25s ease;
        }
        .search-input:focus {
            border-color: var(--accent-color);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: var(--card-color);
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            border-color: var(--card-color);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .card-id {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            background-color: rgba(255, 255, 255, 0.08);
            color: var(--card-color);
        }
        .card-module {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
        }
        .card-title {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: white;
        }
        .card-preview {
            font-size: 0.85rem;
            color: #94a3b8;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            backdrop-filter: blur(8px);
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            max-width: 650px;
            width: 100%;
            border-radius: 16px;
            padding: 2.5rem;
            position: relative;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            animation: modalScale 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalScale {
            from { transform: scale(0.9) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
        .close-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 1.5rem;
            color: #64748b;
            cursor: pointer;
            transition: color 0.2s;
        }
        .close-btn:hover {
            color: white;
        }
        .modal-id {
            display: inline-block;
            font-size: 0.8rem;
            font-weight: 700;
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            background-color: rgba(255, 255, 255, 0.08);
            margin-bottom: 1rem;
        }
        .modal-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: white;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--modal-accent);
            padding-left: 0.8rem;
        }
        .modal-body {
            font-size: 0.95rem;
            color: #cbd5e1;
            line-height: 1.7;
        }
        .modal-body p {
            margin-bottom: 1rem;
        }
        .modal-body li {
            margin-left: 1.2rem;
            margin-bottom: 0.5rem;
            list-style-type: decimal;
        }
        .modal-body strong {
            color: white;
        }
        .modal-body code {
            font-family: monospace;
            background-color: rgba(255,255,255,0.06);
            padding: 0.1rem 0.3rem;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<header>
    <h1>Cognitive Dissonance & Consistency OS Knowledge Map</h1>
    <p class="subtitle">An isomorphic deconstruction of action-based alignment, self-affirmation, and risk insulation to resolve workplace mental frictions</p>
</header>

<div class="search-container">
    <input type="text" id="searchInput" class="search-input" placeholder="Search cards (e.g. action, self, consequence, choice)..." oninput="filterCards()">
</div>

<div class="controls">
    <button class="btn active" onclick="filterModule('all', this)">All</button>
    <button class="btn" onclick="filterModule('M1', this)" style="border-left-color: var(--theme-blue)">Action-Based Alignment</button>
    <button class="btn" onclick="filterModule('M2', this)" style="border-left-color: var(--theme-teal)">Self-Affirmation Cushion</button>
    <button class="btn" onclick="filterModule('M3', this)" style="border-left-color: var(--theme-orange)">Consequence & Risk Defense</button>
    <button class="btn" onclick="filterModule('M4', this)" style="border-left-color: var(--theme-grey)">Forced Compliance & Choice</button>
</div>

<div class="grid" id="cardsGrid"></div>

<!-- Modal Container -->
<div class="modal" id="cardModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="hideModal()">&times;</span>
        <div id="modalId" class="modal-id"></div>
        <div id="modalTitle" class="modal-title"></div>
        <div id="modalBody" class="modal-body"></div>
    </div>
</div>

<script>
    const cards = [
        {
            "id": "EP1", 
            "module": "M1", 
            "moduleName": "Action-Based Model", 
            "color": "#3182CE", 
            "title": "Action Consistency Rule", 
            "body": "<li><strong>Definition</strong>: The brain is essentially a conflict-monitoring and execution engine. Inconsistency between beliefs (cognitive dissonance) causes distress because it creates execution friction, blocking the activation of 'Action Readiness'.</li><li><strong>Mechanism</strong>: Once an action commitment is made, the brain actively aligns beliefs via self-rationalization to clear the execution pipeline, enabling clean, hesitation-free execution.</li><li><strong>History/Source</strong>: [Page 62] Eddie Harmon-Jones' Action-Based Model posits that dissonance is an affective state warning that cognitive conflict is disrupting goal-directed action.</li>"
        },
        {
            "id": "EP2", 
            "module": "M2", 
            "moduleName": "Self-Affirmation Theory", 
            "color": "#319795", 
            "title": "Sovereign Value Redirection", 
            "body": "<li><strong>Definition</strong>: When core beliefs or competence are threatened (e.g. PR rejected, poor performance review), individuals do not need to resolve the failure directly; they can restore self-integrity by affirming unrelated, high-value self-aspects.</li><li><strong>Mechanism</strong>: Establish a self-affirmation safety valve in your decision cycle. By listing core strengths (e.g., 'I am an open-source contributor' or 'I have a great family life'), bypass the localized threat and resume clean execution.</li><li><strong>History/Source</strong>: [Page 156] Claude Steele posits that the self-system is an overall integrity-maintenance system. Threat in one domain is buffered by affirmation in another.</li>"
        },
        {
            "id": "EP3", 
            "module": "M3", 
            "moduleName": "New Look & Consequences", 
            "color": "#DD6B20", 
            "title": "Aversive Consequence Boundary", 
            "body": "<li><strong>Definition</strong>: Dissonance distress primarily stems from feeling personally responsible for producing foreseeable, unwanted negative outcomes. Offloading or isolating this liability blocks dissonance.</li><li><strong>Mechanism</strong>: When taking high-risk decisions, use 'pre-emptive risk documentation' and 'explicit stakeholder sign-off' to strip away personal foreseeability, moving the liability anchor outside your boundary.</li><li><strong>History/Source</strong>: [Page 187] Joel Cooper's New Look model asserts that cognitive dissonance is only aroused when individuals feel personally responsible for producing foreseeable aversive consequences.</li>"
        },
        {
            "id": "EP4", 
            "module": "M4", 
            "moduleName": "Forced Compliance", 
            "color": "#7A7A7A", 
            "title": "Forced Compliance Rationalization", 
            "body": "<li><strong>Definition</strong>: When forced by hierarchy to execute low-value tasks contradicting your beliefs (e.g., coding useless features), if external incentives are minimal, the brain actively shifts internal attitude to believe 'this project has great potential.'</li><li><strong>Mechanism</strong>: Utilize minimal incentives or structural pressure to lock in a 'minimal behavioral commitment,' forcing the brain to rationalise the task to survive authoritarian compliance.</li><li><strong>History/Source</strong>: [Page 22] The classic $1/$20 forced compliance experiment demonstrated that individuals receiving $1 felt high dissonance (lacking external justification) and changed their attitudes significantly.</li>"
        },
        {
            "id": "ACM1", 
            "module": "M1", 
            "moduleName": "Action-Based Model", 
            "color": "#3182CE", 
            "title": "Useless-Feature Decoupled Run", 
            "body": "<li><strong>Core Conflict</strong>: Developers hate coding 'useless business requirements', creating severe mental friction, slow execution, and buggy code.</li><li><strong>Counter-intuitive View</strong>: Instead of arguing requirements with non-tech leads, treat the task as a 'lean experiment' and lock in binary conversion metrics.</li><li><strong>Action</strong>: Accept the ticket immediately, write a simple mockup, and include a telemetry metric to test if conversion > 5% in 2 weeks. If not, auto-deprecate the code. Re-conceptualizing it as an experiment aligns the action thread and kills dissonance.</li>"
        },
        {
            "id": "ACM2", 
            "module": "M2", 
            "moduleName": "Self-Affirmation Theory", 
            "color": "#319795", 
            "title": "Ego Cushioning System", 
            "body": "<li><strong>Core Conflict</strong>: Senior devs face intense demotivation and cognitive friction when their system designs are rejected by leadership.</li><li><strong>Counter-intuitive View</strong>: Ego recovery does not require fighting back or self-doubt. Buffer the localized ego threat by highlighting unrelated sovereign skills.</li><li><strong>Action</strong>: Review your independent open-source contributions or write a blog post detailing complex debug achievements. Reminding yourself 'I am a top-tier systems engineer outside this room' buffers the distress, keeping operational code clean.</li>"
        },
        {
            "id": "ACM3", 
            "module": "M3", 
            "moduleName": "New Look & Consequences", 
            "color": "#DD6B20", 
            "title": "Risk Insulation Shield", 
            "body": "<li><strong>Core Conflict</strong>: Product teams push high-risk hotfixes without tests, leading to downtime. The developer is blamed, causing immense distress.</li><li><strong>Counter-intuitive View</strong>: Dissonance requires personal accountability. Structurally transfer foreseeability to block self-blame.</li><li><strong>Action</strong>: Document risk variables in the ticketing system: 'This hotfix will bypass testing and carries a 90% risk of DB locks.' Require explicit approval: 'Business stakeholders acknowledge and authorize hot-deployment.' If it crashes, liability is fully insulated.</li>"
        },
        {
            "id": "ACM4", 
            "module": "M4", 
            "moduleName": "Forced Compliance", 
            "color": "#7A7A7A", 
            "title": "Post-Decision Audit System", 
            "body": "<li><strong>Core Conflict</strong>: After choosing React over Vue, the team becomes hyper-defensive, exaggerating pros and ignoringVue's benefits, creating a blind spot.</li><li><strong>Counter-intuitive View</strong>: Post-decision dissonance filters out negative signals of the chosen framework. Force objective reality using red-team evaluations.</li><li><strong>Action</strong>: Schedule quarterly post-mortems where developers must present 'Top 3 flaws in our current tech stack and where competitors outperform us.' Forcing the brain to process negative inputs corrects post-decision bias.</li>"
        }
    ];

    let activeModule = 'all';
    let searchQuery = '';

    function renderCards() {
        const grid = document.getElementById('cardsGrid');
        grid.innerHTML = '';
        
        const filtered = cards.filter(card => {
            const matchesModule = activeModule === 'all' || card.module === activeModule;
            const matchesSearch = card.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                  card.body.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                  card.id.toLowerCase().includes(searchQuery.toLowerCase());
            return matchesModule && matchesSearch;
        });

        filtered.forEach(card => {
            const div = document.createElement('div');
            div.className = 'card';
            div.style.setProperty('--card-color', card.color);
            div.onclick = () => showModal(card);
            
            // extract preview text
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = card.body;
            const previewText = tempDiv.innerText || tempDiv.textContent || '';

            div.innerHTML = `
                <div class="card-header">
                    <span class="card-id" style="color: ${card.color}">${card.id}</span>
                    <span class="card-module">${card.moduleName}</span>
                </div>
                <div class="card-title">${card.title}</div>
                <div class="card-preview">${previewText}</div>
            `;
            grid.appendChild(div);
        });
    }

    function filterModule(mod, btn) {
        document.querySelectorAll('.controls .btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeModule = mod;
        renderCards();
    }

    function filterCards() {
        searchQuery = document.getElementById('searchInput').value;
        renderCards();
    }

    function showModal(card) {
        const modal = document.getElementById('cardModal');
        const mId = document.getElementById('modalId');
        const mTitle = document.getElementById('modalTitle');
        const mBody = document.getElementById('modalBody');
        
        mId.innerText = card.id;
        mId.style.color = card.color;
        mTitle.innerText = card.title;
        mTitle.style.borderLeftColor = card.color;
        mBody.innerHTML = card.body;
        
        modal.style.setProperty('--modal-accent', card.color);
        modal.classList.add('active');
    }

    function hideModal() {
        document.getElementById('cardModal').classList.remove('active');
    }

    function closeModal(e) {
        hideModal();
    }

    // Initial render
    renderCards();
</script>

</body>
</html>
