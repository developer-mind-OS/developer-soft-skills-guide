    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TechArticle",
      "headline": "《认知失调》冲突监测与一致性对齐 OS 知识图谱",
      "description": "基于《认知失调》认知冲突与行为执行 OS 框架，提供行动导向对齐、自我肯定软着陆、责任切割防御盾和决策锁定制衡模型。",

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0d11;
            --card-bg: #141720;
            --text-color: #e2e8f0;
            --accent-color: #3182CE;
            --border-color: #222636;
            --theme-slate: #4E6E8F;
            --theme-blue: #3182CE;
            --theme-teal: #319795;
            --theme-orange: #DD6B20;
            --theme-grey: #7A7A7A;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Outfit', 'Noto Sans SC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            padding: 3rem 2rem;
            line-height: 1.6;
        }
        header {
            text-align: center;
            margin-bottom: 3rem;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #93c5fd, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 2rem;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.25s ease;
        }
        .btn:hover, .btn.active {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
            transform: translateY(-2px);
        }
        .search-container {
            max-width: 500px;
            margin: 0 auto 3rem auto;
        }
        .search-input {
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.25s ease;
        }
        .search-input:focus {
            border-color: var(--accent-color);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: var(--card-color);
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            border-color: var(--card-color);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .card-id {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            background-color: rgba(255, 255, 255, 0.08);
            color: var(--card-color);
        }
        .card-module {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
        }
        .card-title {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: white;
        }
        .card-preview {
            font-size: 0.85rem;
            color: #94a3b8;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            backdrop-filter: blur(8px);
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            max-width: 650px;
            width: 100%;
            border-radius: 16px;
            padding: 2.5rem;
            position: relative;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            animation: modalScale 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalScale {
            from { transform: scale(0.9) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
        .close-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 1.5rem;
            color: #64748b;
            cursor: pointer;
            transition: color 0.2s;
        }
        .close-btn:hover {
            color: white;
        }
        .modal-id {
            display: inline-block;
            font-size: 0.8rem;
            font-weight: 700;
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            background-color: rgba(255, 255, 255, 0.08);
            margin-bottom: 1rem;
        }
        .modal-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: white;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--modal-accent);
            padding-left: 0.8rem;
        }
        .modal-body {
            font-size: 0.95rem;
            color: #cbd5e1;
            line-height: 1.7;
        }
        .modal-body p {
            margin-bottom: 1rem;
        }
        .modal-body li {
            margin-left: 1.2rem;
            margin-bottom: 0.5rem;
            list-style-type: decimal;
        }
        .modal-body strong {
            color: white;
        }
        .modal-body code {
            font-family: monospace;
            background-color: rgba(255,255,255,0.06);
            padding: 0.1rem 0.3rem;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<header>
    <h1>《认知失调》冲突监测与一致性对齐 OS 知识图谱</h1>
    <p class="subtitle">通过行动对齐、自我肯定、责任隔离和合理化对赌，透视并解决职场心理冲突与执行内耗</p>
</header>

<div class="search-container">
    <input type="text" id="searchInput" class="search-input" placeholder="输入关键词搜索卡片（如：行动、肯定、后果、决策后）..." oninput="filterCards()">
</div>

<div class="controls">
    <button class="btn active" onclick="filterModule('all', this)">全部</button>
    <button class="btn" onclick="filterModule('M1', this)" style="border-left-color: var(--theme-blue)">行动导向与对齐</button>
    <button class="btn" onclick="filterModule('M2', this)" style="border-left-color: var(--theme-teal)">自我肯定与缓冲</button>
    <button class="btn" onclick="filterModule('M3', this)" style="border-left-color: var(--theme-orange)">后果责任与防御</button>
    <button class="btn" onclick="filterModule('M4', this)" style="border-left-color: var(--theme-grey)">诱导顺从与锁定</button>
</div>

<div class="grid" id="cardsGrid"></div>

<!-- Modal Container -->
<div class="modal" id="cardModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="hideModal()">&times;</span>
        <div id="modalId" class="modal-id"></div>
        <div id="modalTitle" class="modal-title"></div>
        <div id="modalBody" class="modal-body"></div>
    </div>
</div>

<script>
    const cards = [
        {
            "id": "EP1", 
            "module": "M1", 
            "moduleName": "Action-Based Model", 
            "color": "#3182CE", 
            "title": "行动一致性法则", 
            "body": "<li><strong>定义</strong>：人脑本质上是一个冲突监测与执行引擎。信念的不一致（认知失调）之所以会引发心理痛苦，是因为它会产生执行摩擦，阻碍“行动准备状态”（Action Readiness）的物理激活。</li><li><strong>机制</strong>：当行为承诺已经做出时，大脑会通过强行扭曲或重构信念（即自我合理化）来消除不一致，以确保行动线程能够高效率、无卡顿地执行完毕。</li><li><strong>学术源头</strong>：[Page 62] Eddie Harmon-Jones 的行动导向模型认为失调是一种负性情感，它警示大脑当前的认知冲突正在干扰有目的的协调行动。</li>"
        },
        {
            "id": "EP2", 
            "module": "M2", 
            "moduleName": "Self-Affirmation Theory", 
            "color": "#319795", 
            "title": "自我价值防御重定向", 
            "body": "<li><strong>定义</strong>：当核心信念或能力遭到重大挫败（如 PR 被拒、考核不及格）时，人不需要直接去纠正该失败，而是可以通过肯定自身其他无关的高价值维度来维持自我的整体完整性。</li><li><strong>机制</strong>：在决策流中，设立“自我肯定安全阀”，通过列举自己的核心闪光点（如“我是卓越的技术极客”或“我拥有完美的家庭”），旁路拦截冲突，迅速恢复编码状态。</li><li><strong>学术源头</strong>：[Page 156] Claude Steele 提出自我系统是一个旨在维持整体自我完整性的体系。当一个层面受威胁时，通过其他层面的肯定可消除不适。</li>"
        },
        {
            "id": "EP3", 
            "module": "M3", 
            "moduleName": "New Look & Consequences", 
            "color": "#DD6B20", 
            "title": "后果责任边界防线", 
            "body": "<li><strong>定义</strong>：失调的痛苦主要源于对“自己产生了可预见的、不良的外部后果”这一事实的自我指责。将后果责任成功外包或隔离，即可物理阻断失调的产生。</li><li><strong>机制</strong>：在承接高风险决策时，通过“责任声明前置”和“强制多级确认”，将不良后果的“ foreseability（可预见性）”剥离，将责任锚点移出自身边界。</li><li><strong>学术源头</strong>：[Page 187] Joel Cooper 提出的 New Look 理论认为，只有当人们感到自己对产生不良后果负有个人责任时，才会产生认知失调。</li>"
        },
        {
            "id": "EP4", 
            "module": "M4", 
            "moduleName": "Forced Compliance", 
            "color": "#7A7A7A", 
            "title": "强制顺从合理化", 
            "body": "<li><strong>定义</strong>：在权力阶层下被强迫执行与其信念相悖的低价值任务时（如被迫编写垃圾功能），如果外部奖惩极低，执行者反而会主动重构自己的认知，劝说自己“这个任务其实很有商业前景”。</li><li><strong>机制</strong>：通过微量物质激励或极限权力施压促成“最小行为承诺”，逼迫执行者的大脑自动运转合理化机制，反向重构信念以服从权威。</li><li><strong>学术源头</strong>：[Page 22] 经典 1$/20$ 诱导顺从实验表明，获得 1$ 报酬的人由于缺乏外部足够理由，会产生强烈的内部失调，进而大幅度改变对无聊工作的态度。</li>"
        },
        {
            "id": "ACM1", 
            "module": "M1", 
            "moduleName": "Action-Based Model", 
            "color": "#3182CE", 
            "title": "伪需求脱敏对赌", 
            "body": "<li><strong>核心冲突</strong>：开发人员极其反感无商业价值的“伪需求”，被迫执行时由于认知冲突导致行动迟缓、编写低质量代码，形成双输局面。</li><li><strong>反常识主张</strong>：不要试图向非技术管理者自证清白，直接将“伪需求”打包为“快速试错实验”，设立严格的流量转化对赌指标。</li><li><strong>同构动作</strong>：开发组不与高管直接争论需求的荒谬性，而是一边快速上线简陋版，一边以量化对赌形式锁定“若两周内无 5% 转化率则永久撤除该功能”的退出协议。消除了执行阶段的心理摩擦。</li>"
        },
        {
            "id": "ACM2", 
            "module": "M2", 
            "moduleName": "Self-Affirmation Theory", 
            "color": "#319795", 
            "title": "Ego Cushion 缓冲隔离", 
            "body": "<li><strong>核心冲突</strong>：架构设计被强行驳回或项目被腰斩，产生极大的职业尊严挫败与自我怀疑。</li><li><strong>反常识主张</strong>：Ego 的修复不需要通过直接扭曲现状或在同一个失败坑洞里自证来完成，在完全无关的领域进行价值锚定更加高效。</li><li><strong>同构动作</strong>：在架构被拒当晚，在个人技术博客或 GitHub 开源项目中发布自己长期主导的底层代码贡献，并在日记中肯定自己“我依然是社区里的 10x 开发者”。以此物理缓冲挫败感，阻断消极怠工。</li>"
        },
        {
            "id": "ACM3", 
            "module": "M3", 
            "moduleName": "New Look & Consequences", 
            "color": "#DD6B20", 
            "title": "Jira 风险审计防御盾", 
            "body": "<li><strong>核心冲突</strong>：管理层在无 QA、无压力测试的情况下强推高风险上线，一旦产生严重事故，责任转嫁给底层程序员，引发巨大失调。</li><li><strong>反常识主张</strong>：失调源于“个人对可预见的不良后果负有责任”。通过物理流程将“ Foreseeability（可预见性）”以合规证据链固化，即可阻断自我指责。</li><li><strong>同构动作</strong>：在 Jira/邮件中详细列出上线风险、缺少压测的事实，明确写出“此操作极大概率导致集群熔断”，并抄送相关业务负责人。要求其明确回复“已知晓此风险，并授权跳过测试上线”。发生宕机后责任完全外包。</li>"
        },
        {
            "id": "ACM4", 
            "module": "M4", 
            "moduleName": "Forced Compliance", 
            "color": "#7A7A7A", 
            "title": "决策后偏误自矫正", 
            "body": "<li><strong>核心冲突</strong>：在 React 与 Vue，或 K8s 与 Nomad 方案中做出二选一抉择后，团队陷入对所选方案的狂热崇拜，盲目贬低另一方，阻碍后续排障。</li><li><strong>反常识主张</strong>：决策后失调会强制大脑运行“夸大优点、掩盖缺点”的低频滤波器。必须使用强制的“紅队反向对立报告”来打破心智锁定。</li><li><strong>同构动作</strong>：每季度召集“技术回溯会”，强行让负责所选方案的架构师编写一份《当前方案的 3 个致命缺陷与替代方案的优势》报告，强制其大脑打破合理化滤镜，保持架构清醒。</li>"
        }
    ];

    let activeModule = 'all';
    let searchQuery = '';

    function renderCards() {
        const grid = document.getElementById('cardsGrid');
        grid.innerHTML = '';
        
        const filtered = cards.filter(card => {
            const matchesModule = activeModule === 'all' || card.module === activeModule;
            const matchesSearch = card.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                  card.body.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                  card.id.toLowerCase().includes(searchQuery.toLowerCase());
            return matchesModule && matchesSearch;
        });

        filtered.forEach(card => {
            const div = document.createElement('div');
            div.className = 'card';
            div.style.setProperty('--card-color', card.color);
            div.onclick = () => showModal(card);
            
            // extract preview text
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = card.body;
            const previewText = tempDiv.innerText || tempDiv.textContent || '';

            div.innerHTML = `
                <div class="card-header">
                    <span class="card-id" style="color: ${card.color}">${card.id}</span>
                    <span class="card-module">${card.moduleName}</span>
                </div>
                <div class="card-title">${card.title}</div>
                <div class="card-preview">${previewText}</div>
            `;
            grid.appendChild(div);
        });
    }

    function filterModule(mod, btn) {
        document.querySelectorAll('.controls .btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeModule = mod;
        renderCards();
    }

    function filterCards() {
        searchQuery = document.getElementById('searchInput').value;
        renderCards();
    }

    function showModal(card) {
        const modal = document.getElementById('cardModal');
        const mId = document.getElementById('modalId');
        const mTitle = document.getElementById('modalTitle');
        const mBody = document.getElementById('modalBody');
        
        mId.innerText = card.id;
        mId.style.color = card.color;
        mTitle.innerText = card.title;
        mTitle.style.borderLeftColor = card.color;
        mBody.innerHTML = card.body;
        
        modal.style.setProperty('--modal-accent', card.color);
        modal.classList.add('active');
    }

    function hideModal() {
        document.getElementById('cardModal').classList.remove('active');
    }

    function closeModal(e) {
        hideModal();
    }

    // Initial render
    renderCards();
</script>

</body>
</html>
